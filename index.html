<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>I love Cook</title>

<link rel="stylesheet" href="styles.css" />
<link rel="manifest" href="manifest.json" />
</head>

<body>

<!-- SETUP (solo primera vez) -->
<div id="setupScreen" class="screen hidden">
<div class="card">
    <h1>Bienvenido 👋</h1>
    <p>Escribe tu nombre para empezar</p>

    <input id="nameInput" type="text" placeholder="Tu nombre..." />

    <button onclick="saveName()">Entrar</button>
</div>
</div>

<!-- APP NORMAL -->
<div id="appScreen" class="screen hidden">
<header>
    <h2 id="greeting"></h2>
</header>
</div>
<div>
    <p></p>
</div>
<div class="main-container">
<button class="menu-btn" onclick="toggleSection('recetas')">RECETAS</button>
<div id="recetas" class="content-box">
<p>Aquí van todas las recetas...</p>
</div>

<button class="menu-btn" onclick="toggleSection('burgers')">HAMBURGUESAS</button>
<div id="burgers" class="content-box">
    <p>Aquí todas las burgers...</p>
</div>

<button class="menu-btn" onclick="toggleSection('pasta')">PASTA</button>
<div id="pasta" class="content-box">
    <p>Aquí todos los platos de pasta...</p>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
